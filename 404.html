<html lang="ru">

    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"

    <title>404 — Квест не найден</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Unbounded:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0e0e12;
        --pink: #e8a8d8;
        --purple: #b088d0;
        --text: #f0f0f6;
        --text2: #8888a0;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        overflow-x: hidden;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Plus Jakarta Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
        padding: 24px 16px;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
        opacity: 0.025;
        pointer-events: none;
        z-index: 9999;
      }

      /* Blobs — фиксированные, не вызывают overflow */
      .blob {
        position: fixed;
        pointer-events: none;
        z-index: 0;
        border-radius: 50%;
        filter: blur(90px);
        opacity: 0.13;
        overflow: hidden;
      }
      .blob-1 {
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, var(--pink), transparent 70%);
        top: -120px;
        left: 50%;
        transform: translateX(-50%);
      }
      .blob-2 {
        width: 320px;
        height: 320px;
        background: radial-gradient(circle, var(--purple), transparent 70%);
        bottom: -80px;
        right: -60px;
      }

      /* Main content */
      .error-content {
        text-align: center;
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 440px;
        animation: fadeUp 0.5s ease both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Logo */
      .logo-area {
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: center;
        margin-bottom: 40px;
        opacity: 0.65;
      }
      .logo-gem {
        width: 30px;
        height: 30px;
        filter: drop-shadow(0 0 10px rgba(232, 168, 216, 0.45));
        flex-shrink: 0;
      }
      .logo-gem svg {
        width: 30px;
        height: 30px;
      }
      .logo-text {
        font-family: "Unbounded", sans-serif;
        font-size: 17px;
        font-weight: 900;
        background: linear-gradient(135deg, var(--text), var(--pink));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* 404 number */
      h1 {
        font-family: "Unbounded", sans-serif;
        font-size: clamp(72px, 22vw, 130px);
        margin: 0 0 6px;
        background: linear-gradient(135deg, var(--pink), var(--purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 32px rgba(232, 168, 216, 0.22));
        line-height: 1;
      }
      .subtitle {
        font-size: clamp(14px, 4vw, 17px);
        color: var(--text2);
        font-weight: 700;
        margin-bottom: 6px;
      }
      .hint {
        font-size: clamp(12px, 3.5vw, 14px);
        color: var(--text2);
        opacity: 0.55;
        margin-bottom: 36px;
      }

      /* Button */
      .btn-home {
        background: linear-gradient(135deg, var(--pink), var(--purple));
        color: #111;
        padding: 15px 32px;
        border-radius: 14px;
        text-decoration: none;
        font-weight: 800;
        font-size: clamp(13px, 3.5vw, 15px);
        transition:
          transform 0.2s,
          opacity 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 52px; /* удобно тыкать */
      }
      .btn-home:hover {
        transform: translateY(-2px);
        opacity: 0.92;
      }
      .btn-home svg {
        flex-shrink: 0;
      }

      /* Links */
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 16px 24px;
        justify-content: center;
        margin-top: 28px;
      }
      .links a {
        font-size: clamp(11px, 3vw, 13px);
        color: var(--text2);
        font-weight: 700;
        text-decoration: none;
        transition: color 0.2s;
        padding: 4px 0;
        min-height: 32px;
        display: flex;
        align-items: center;
      }
      .links a:hover {
        color: var(--text);
      }

      /* ── Mobile 480px (375px target) ── */
      @media (max-width: 480px) {
        body {
          padding: 20px 20px;
          align-items: center;
        }

        .logo-area {
          margin-bottom: 32px;
        }
        .logo-gem {
          width: 26px;
          height: 26px;
        }
        .logo-text {
          font-size: 15px;
        }

        /* Цифра 404 — clamp уже работает */
        .hint {
          margin-bottom: 28px;
        }

        /* Кнопка — полная ширина */
        .btn-home {
          width: 100%;
          justify-content: center;
          padding: 16px 20px;
          border-radius: 14px;
        }

        /* Links — 2 в строку */
        .links {
          gap: 12px 20px;
          margin-top: 24px;
        }

        /* Убираем второй блоб */
        .blob-2 {
          display: none;
        }
        /* Уменьшаем первый блоб */
        .blob-1 {
          width: 260px;
          height: 260px;
          top: -80px;
        }
      }
    </style>
  </head>
